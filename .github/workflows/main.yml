name: CI

on: [push, workflow_dispatch]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  allPackages:
    runs-on: ubuntu-latest
    env:
      cancelJob: false
      srcModified: false
    strategy:
      fail-fast: false
      matrix:
        pkgInfo: [
          'zaread-git|N', 'holehe-git|Y', 'onivim2-bin|Y', 'cst-git|N', 'cdwm-git|N', 'librewolf-sync|Y',
          'cslock-git|N', 'cdmenu-git|N', 'pvs-studio|N', 'knock-git|N', 'hakrawler-git|Y', 'bashmount|Y', 
          'bashmount-git|Y', 'firefox-sync|Y', 'pdd-git|Y', 'onivim2-nightly-bin|Y', 'python-isr-git|N', 
          'repostat-git|Y', 'python-upnpclient|N', 'vidmerger-bin|Y', 'vidmerger-git|Y', 'paisa-git|Y',
          'paisa-bin|Y', 'pdfjumbler|Y', 'pdfjumbler-git|Y', 'passhole-git|N', 'grub-update-hook|N'
        ]
    steps:
      - name: Set env variables
        env:
          PKGINFO: ${{ matrix.pkgInfo }}
        run: |
          pkgName=$(echo "${PKGINFO}" | cut -d$'|' -f1)
          echo "pkgName=$pkgName" >> $GITHUB_ENV
          inAur=$(echo "${PKGINFO}" | cut -d$'|' -f2)
          echo "inAur=$inAur" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Check modified files
        run: |
          git diff --name-only HEAD HEAD^ | cut -d$'/' -f1 | grep -q "^${pkgName}$" || echo "cancelJob=true" >> $GITHUB_ENV
          msg="Update" && [ -f "${pkgName}/.SRCINFO" ] || msg="Add"
          echo "msg=$msg" >> $GITHUB_ENV

      - name: Build package and output .SRCINFO
        if: ${{ env.cancelJob == 'false' }}
        uses: santilococo/calbuilder@master
        with:
          pkgDir: "${{ env.pkgName }}"
          gpgPublicKey: "C03E1F00B0461E7F"
          gpgPrivateKey: "${{ secrets.GPG_PRIVATE_KEY }}"
          gpgPassphrase: "${{ secrets.GPG_PASSPHRASE }}"

      - name: Push .SRCINFO
        if: ${{ env.cancelJob == 'false' }}
        run: |
          git config --local user.name "$(git log --format=%an | head -n 1)"
          git config --local user.email "$(git log --format=%ae | head -n 1)"
          mv .SRCINFO "${pkgName}"
          gitStatus="$(git status --porcelain)"
          if [ ! -z "$gitStatus" ]; then
            git pull
            if echo "$gitStatus" | grep -q "PKGBUILD"; then
              git add "${pkgName}/PKGBUILD"
              git commit -m "Bump ${pkgName} version"
            fi
            if echo "$gitStatus" | grep -q ".SRCINFO"; then 
              git add "${pkgName}/.SRCINFO"
              git commit -m "${msg} ${pkgName}/.SRCINFO"
              echo "srcModified=true" >> $GITHUB_ENV
            fi
            git push
          fi

      - name: Push to AUR
        if: ${{ env.cancelJob == 'false' && env.inAur == 'Y' }}
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          AUR_SSH_PASSPHRASE: ${{ secrets.AUR_SSH_PASSPHRASE }}
        run: |
          [ ! -d $HOME/.ssh ] && mkdir -m 0700 $HOME/.ssh
          ssh-keyscan -H aur.archlinux.org > $HOME/.ssh/known_hosts
          echo "${AUR_SSH_KEY}" > $HOME/.ssh/aur
          chmod 0600 $HOME/.ssh/aur
          ssh-keygen -vy -f $HOME/.ssh/aur -P ${AUR_SSH_PASSPHRASE} > $HOME/.ssh/aur.pub
          chmod 0644 $HOME/.ssh/aur.pub
          eval $(ssh-agent)
          ssh-keygen -p -P "${AUR_SSH_PASSPHRASE}" -N "" -f $HOME/.ssh/aur
          ssh-add $HOME/.ssh/aur
          
          git pull
          msg="$(git log --format=%s | sed --sandbox -n 2p)" && [ ${srcModified} = true ] || msg="$(git log --format=%s | head -n 1)"
          git config --local user.name "$(git log --format=%an | head -n 1)"
          git config --local user.email "$(git log --format=%ae | head -n 1)"
          
          git checkout --orphan ${pkgName}
          git rm -rf .
          git remote add ${pkgName} ssh://aur@aur.archlinux.org/${pkgName}.git
          set +e; git pull ${pkgName} master; set -e
          git checkout master ${pkgName}
          find ${pkgName} -mindepth 1 -maxdepth 1 -exec mv {} . \;
          rm -rf *.zst* pkg src calrepo
          if [ ! -z "$(git status --porcelain)" ]; then
            git add .
            git commit -m "$msg"
            git push --set-upstream ${pkgName} ${pkgName}:master
          fi
